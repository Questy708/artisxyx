# Railway deployment configuration
# Docs: https://docs.railway.com/railway-toml
#
# A Dockerfile exists in the repo root — Railway auto-detects and uses it.
# This file configures the health check and restart policy.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Health check: Railway hits "/" and expects a 200 within 100 seconds.
# Next.js serves "/" from the homepage, so this works.
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ─── REQUIRED ENVIRONMENT VARIABLES (set in Railway → Variables tab) ───
#
# ADMIN_PASSWORD  — admin login password (16+ chars, upper+lower+number+special)
# ADMIN_SECRET    — random string, 32+ chars (signs admin session tokens)
# DATABASE_URL    — either:
#                   • SQLite:  file:/data/custom.db
#                     (requires a Railway Volume mounted at /data — see below)
#                   • Postgres: postgresql://... (recommended for production)
#                     (add the Railway PostgreSQL addon, then use its DATABASE_URL
#                      and change provider in prisma/schema.prisma to "postgresql")
#
# ─── SQLite Volume setup (if using file:/data/custom.db) ───
# 1. In Railway → your service → Settings → Volumes
# 2. Add a volume with mount path: /data
# 3. Set DATABASE_URL = file:/data/custom.db
# This persists the SQLite file across redeploys.
